<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Formulario de Registro</title>
  
    <link rel="stylesheet"  href="./CSS/form.css">
</head>
<body>
  <div class="container">
    <h1>Formulario de Registro</h1>

    <form id="form-persona" novalidate>
      <div class="grid">
        <!-- Identificación -->
        <div>
          <label for="documento">Documento <span aria-hidden="true">*</span></label>
          <select id="documento" name="documento" required>
            <option value="" selected disabled>Selecciona…</option>
            <option value="CC">CC</option>
                 <option value="TI">TI</option>
          </select>
          <p class="help">Tipo de documento.</p>
        </div>

        <div>
          <label for="identificacion">Número de Identificación <span aria-hidden="true">*</span></label>
          <input id="identificacion" name="identificacion" inputmode="numeric" pattern="[0-9]{5,20}" required
                 placeholder="Ej: 1234567890" aria-describedby="id-help" />
          <p id="id-help" class="help">Solo números, entre 5 y 20 dígitos.</p>
        </div>

        <!-- Nombres y apellidos -->
        <div>
          <label for="primerNombre">Primer Nombre <span aria-hidden="true">*</span></label>
          <input id="primerNombre" name="primerNombre" required placeholder="Ej: Ana" />
        </div>

        <div>
          <label for="segundoNombre">Segundo Nombre</label>
          <input id="segundoNombre" name="segundoNombre" placeholder="Opcional" />
        </div>

        <div>
          <label for="primerApellido">Primer Apellido <span aria-hidden="true">*</span></label>
          <input id="primerApellido" name="primerApellido" required placeholder="Ej: Pérez" />
        </div>

        <div>
          <label for="segundoApellido">Segundo Apellido</label>
          <input id="segundoApellido" name="segundoApellido" placeholder="Opcional" />
        </div>

        <!-- Datos de contacto -->
        <div class="span-2">
          <label for="domicilio">Domicilio</label>
          <input id="domicilio" name="domicilio" placeholder="Apartamento / Interior / Casa" />
        </div>

        <div>
          <label for="direccion">Dirección <span aria-hidden="true">*</span></label>
          <input id="direccion" name="direccion" required placeholder="Ej: Cra 45 # 72-15" />
        </div>

        <div>
          <label for="barrio">Barrio</label>
          <input id="barrio" name="barrio" placeholder="Ej: El Prado" />
        </div>

        <div>
          <label for="celular">Número Celular <span aria-hidden="true">*</span></label>
          <input id="celular" name="celular" type="tel" inputmode="numeric" pattern="[0-9]{7,15}" required
                 placeholder="Ej: 3001234567" aria-describedby="cel-help" />
          <p id="cel-help" class="help">Solo números (7–15 dígitos).</p>
        </div>

        <div>
          <label for="email">Email <span aria-hidden="true">*</span></label>
          <input id="email" name="email" type="email" required placeholder="tu@correo.com" />
        </div>

        <div>
          <label for="fechaNac">Fecha de nacimiento <span aria-hidden="true">*</span></label>
          <input id="fechaNac" name="fechaNac" type="date" required max="" />
        </div>



        <div>
          <label for="sexo">Sexo <span aria-hidden="true">*</span></label>
          <select id="sexo" name="sexo" required>
            <option value="" selected disabled>Selecciona…</option>
            <option value="F">Femenino</option>
            <option value="M">Masculino</option>
            <option value="X">Otro / Prefiero no decir</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn--primary" type="submit">Enviar</button>
        <button class="btn" type="reset">Limpiar</button>
      </div>

      <p id="form-status" class="status" role="status" aria-live="polite"></p>
    </form>
  </div>

  <script>
    // Máxima fecha = hoy para fecha de nacimiento
    const fechaNac = document.getElementById('fechaNac');
    const edad = document.getElementById('edad');
    const statusEl = document.getElementById('form-status');

    (function setMaxDateToday(){
      const today = new Date();
      const y = today.getFullYear();
      const m = String(today.getMonth()+1).padStart(2,'0');
      const d = String(today.getDate()).padStart(2,'0');
      const iso = `${y}-${m}-${d}`;
      if (fechaNac) fechaNac.max = iso;
    })();

    // Cálculo de edad
    function calcularEdad(fechaISO){
      const hoy = new Date();
      const nac = new Date(fechaISO);
      let e = hoy.getFullYear() - nac.getFullYear();
      const m = hoy.getMonth() - nac.getMonth();
      if (m < 0 || (m === 0 && hoy.getDate() < nac.getDate())) e--;
      return e;
    }
    fechaNac?.addEventListener('change', () => {
      if (fechaNac.value) {
        const e = calcularEdad(fechaNac.value);
        edad.value = isFinite(e) && e >= 0 ? e : '';
      } else {
        edad.value = '';
      }
    });

    // Validación básica y mensaje de estado
    const form = document.getElementById('form-persona');
    form?.addEventListener('submit', (ev) => {
      statusEl.textContent = '';
      const ok = form.checkValidity();
      if (!ok) {
        ev.preventDefault();
        form.reportValidity();
        statusEl.innerHTML = 'Por favor, completa los campos obligatorios marcados con *.';
        statusEl.classList.add('error');
      } else {
        // Aquí podrías enviar con fetch() a tu backend
        statusEl.textContent = 'Formulario enviado correctamente.';
        statusEl.classList.remove('error');
      }
    });
  </script>
</body>
</html>
