<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Dinámico - DB CRUD</title>

    <link rel="stylesheet"  href="./CSS/form.css">
</head>
<body>
    <div class="container">
        <h1>📝 Formulario Dinámico CRUD</h1>
        
        <!-- Mensajes -->
        <div id="status" class="status" style="display: none;"></div>
        
        <!-- Formulario dinámico -->
        <form id="dynamicForm" class="form-grid">
            <div>
                <label for="primer_nombres">Primer Nombres *</label>
                <input type="text" id="primer_nombres" name="primer_nombres" required>
            </div>
            <div>
                <label for="segundo_nombre">Segundo Nombre</label>
                <input type="text" id="segundo_nombre" name="segundo_nombre">
            </div>
            <div>
                <label for="primer_apellido">Primer Apellido *</label>
                <input type="text" id="primer_apellido" name="primer_apellido" required>
            </div>
            <div>
                <label for="segundo_apellido">Segundo Apellido</label>
                <input type="text" id="segundo_apellido" name="segundo_apellido">
            </div>
            <div>
                <label for="documento">Documento *</label>
                <select id="documento" name="documento" required>
                    <option value="">Seleccionar...</option>
                    <option value="CC">Cédula de Ciudadanía</option>
                    <option value="TI">Tarjeta de Identidad</option>
                    <option value="CE">Cédula de Extranjería</option>
                    <option value="PA">Pasaporte</option>
                </select>
            </div>
            <div>
                <label for="numero_identificacion">Número Identificación *</label>
                <input type="text" id="numero_identificacion" name="numero_identificacion" required>
            </div>
            <div>
                <label for="domicilio">Domicilio</label>
                <input type="text" id="domicilio" name="domicilio">
            </div>
            <div>
                <label for="fecha_nacimiento">Fecha Nacimiento</label>
                <input type="date" id="fecha_nacimiento" name="fecha_nacimiento">
            </div>
            <div>
                <label for="edad">Edad</label>
                <input type="number" id="edad" name="edad" min="0" max="120">
            </div>
            <div>
                <label for="sexo">Sexo</label>
                <select id="sexo" name="sexo">
                    <option value="">Seleccionar...</option>
                    <option value="M">Masculino</option>
                    <option value="F">Femenino</option>
                    <option value="O">Otro</option>
                </select>
            </div>
            <div>
                <label for="numero_celular">Número Celular</label>
                <input type="tel" id="numero_celular" name="numero_celular">
            </div>
            <div>
                <label for="direccion">Dirección *</label>
                <input type="text" id="direccion" name="direccion" required>
            </div>
            <div>
                <label for="barrio">Barrio</label>
                <input type="text" id="barrio" name="barrio">
            </div>
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
            </div>
            
            <!-- Botones -->
            <div style="grid-column: 1 / -1; text-align: center; padding-top: 20px;">
                <button type="submit" class="btn btn-success" id="btnGuardar">💾 Guardar</button>
                <button type="button" class="btn" id="btnLimpiar">🧹 Limpiar</button>
                <button type="button" class="btn" id="btnListar">📋 Listar</button>
            </div>
        </form>
        
        <!-- Lista de registros -->
        <div id="records" style="display: none;">
            <h3>📊 Registros <span id="totalRecords"></span></h3>
            <div id="recordsList"></div>
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn" id="btnAnterior">⬅️ Anterior</button>
                <span id="paginationInfo"></span>
                <button class="btn" id="btnSiguiente">Siguiente ➡️</button>
            </div>
        </div>
    </div>

    <script>
        //  CONFIGURACIÓN BACKEND
        const API_BASE = 'http://localhost:8000/api';  // Connecion BACKEND
        const TABLE_NAME = 'personas';  //  Tabla del formulario
        
        let currentPage = 1;
        let totalRecords = 0;
        let editingId = null;
        let tableStructure = [];
        
        const HEADERS = {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
        };
        
        //  FUNCIONES API
        async function apiCall(endpoint, method = 'GET', data = null) {
            const url = `${API_BASE}/${endpoint}`;
            showStatus('loading', '⏳ Conectando...');
            
            try {
                const options = { headers: HEADERS };
                if (data) options.body = JSON.stringify(data);
                if (method !== 'GET') options.method = method;
                
                const response = await fetch(url, options);
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || error.error || `HTTP ${response.status}`);
                }
                return await response.json();
            } catch (error) {
                showStatus('error', `❌ Error: ${error.message}`);
                throw error;
            }
        }
        
        //  CARGAR ESTRUCTURA TABLA (campos dinámicos)
        async function loadTableStructure() {
            try {
                const data = await apiCall(`table/${TABLE_NAME}/structure`);
                tableStructure = data.fields;
                console.log('✅ Estructura cargada:', tableStructure.map(f => f.name));
            } catch (error) {
                console.error('Error estructura:', error);
            }
        }
        
        //  GUARDAR/EDITAR
        document.getElementById('dynamicForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = Object.fromEntries(new FormData(e.target));
            
            // Checkbox handling
            const activo = document.querySelector('input[name="activo"]')?.checked || true;
            formData.activo = activo;
            
            try {
                if (editingId) {
                    // Editar
                    await apiCall(`table/${TABLE_NAME}/${editingId}`, 'PUT', formData);
                    showStatus('success', '✅ Registro actualizado');
                } else {
                    // Nuevo
                    const result = await apiCall(`table/${TABLE_NAME}/insert`, 'POST', formData);
                    showStatus('success', `✅ Creado con ID: ${result.id}`);
                }
                document.getElementById('dynamicForm').reset();
                editingId = null;
                document.getElementById('btnGuardar').textContent = '💾 Guardar';
                loadRecords();
            } catch (error) {
                console.error('Error guardar:', error);
            }
        });
        
        // 📋 LISTAR REGISTROS
        async function loadRecords(page = 1) {
            try {
                currentPage = page;
                const data = await apiCall(`table/${TABLE_NAME}?page=${page}&limit=10`);
                totalRecords = data.total;
                renderRecords(data.records);
                updatePagination();
                document.getElementById('records').style.display = 'block';
            } catch (error) {
                console.error('Error listar:', error);
            }
        }
        
        function renderRecords(records) {
            const container = document.getElementById('recordsList');
            container.innerHTML = records.map(record => `
                <div class="record-card">
                    <h4>${record.primer_nombres} ${record.primer_apellido}</h4>
                    <p><strong>Doc:</strong> ${record.documento} ${record.numero_identificacion}</p>
                    <p><strong>Email:</strong> ${record.email || 'N/A'}</p>
                    <p><strong>Tel:</strong> ${record.numero_celular || 'N/A'}</p>
                    <p><strong>Dirección:</strong> ${record.direccion}, ${record.barrio}</p>
                    <div style="margin-top: 10px;">
                        <button class="btn" onclick="editRecord(${record.id})">✏️ Editar</button>
                        <button class="btn btn-danger" onclick="deleteRecord(${record.id})">🗑️ Eliminar</button>
                    </div>
                </div>
            `).join('');
        }
        
        //  EDITAR
        async function editRecord(id) {
            try {
                const record = await apiCall(`table/${TABLE_NAME}/${id}`);
                editingId = id;
                document.getElementById('btnGuardar').textContent = '💾 Actualizar';
                
                // Llenar formulario
                Object.keys(record).forEach(key => {
                    const input = document.querySelector(`[name="${key}"]`);
                    if (input) {
                        if (input.type === 'checkbox') {
                            input.checked = record[key];
                        } else {
                            input.value = record[key] || '';
                        }
                    }
                });
                
                showStatus('success', '✏️ Cargado para editar');
                document.getElementById('dynamicForm').scrollIntoView();
            } catch (error) {
                console.error('Error editar:', error);
            }
        }
        
        //  ELIMINAR
        async function deleteRecord(id) {
            if (!confirm('¿Eliminar este registro?')) return;
            
            try {
                await apiCall(`table/${TABLE_NAME}/${id}`, 'DELETE');
                showStatus('success', '🗑️ Eliminado correctamente');
                loadRecords(currentPage);
            } catch (error) {
                console.error('Error eliminar:', error);
            }
        }
        
        // UI Helpers
        function showStatus(type, message) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
            status.style.display = 'block';
            setTimeout(() => status.style.display = 'none', 5000);
        }
        
        function updatePagination() {
            document.getElementById('totalRecords').textContent = `(${totalRecords})`;
            document.getElementById('paginationInfo').textContent = `Página ${currentPage}`;
            
            document.getElementById('btnAnterior').disabled = currentPage <= 1;
            document.getElementById('btnSiguiente').disabled = currentPage * 10 >= totalRecords;
        }
        
        //  EVENTOS BOTONES
        document.getElementById('btnLimpiar').onclick = () => {
            document.getElementById('dynamicForm').reset();
            editingId = null;
            document.getElementById('btnGuardar').textContent = '💾 Guardar';
        };
        
        document.getElementById('btnListar').onclick = () => loadRecords(1);
        document.getElementById('btnAnterior').onclick = () => loadRecords(currentPage - 1);
        document.getElementById('btnSiguiente').onclick = () => loadRecords(currentPage + 1);
        
        // 🚀 INICIALIZAR
        window.onload = async () => {
            await loadTableStructure();
            showStatus('success', '✅ Conectado al backend');
            loadRecords(1);
        };
    </script>
</body>
</html>
